name: Integración Continua

on:
  push:
    branches:
      - master

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Verificar existencia del HTML
        run: |
          test -f index.html
          echo "Archivo encontrado"

      - name: Ejecutar prueba
        run: |
          chmod +x tests/test.sh
          ./tests/test.sh